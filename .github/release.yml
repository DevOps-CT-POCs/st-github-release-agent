# GitHub Release Notes Configuration
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - ignore-for-release
      - skip-changelog
    authors:
      - dependabot
      - renovate

  categories:
    - title: "🚀 Features"
      labels:
        - feature
        - enhancement

    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
        - bugfix

    - title: "⚠️ Breaking Changes"
      labels:
        - breaking-change
        - breaking

    - title: "📝 Documentation"
      labels:
        - documentation
        - docs

    - title: "📦 Dependencies"
      labels:
        - dependencies
        - deps

    - title: "🔧 Maintenance"
      labels:
        - chore
        - maintenance
        - ci
        - build

    - title: "⚡ Performance"
      labels:
        - performance
        - perf

    - title: "🔒 Security"
      labels:
        - security

    - title: "🧪 Tests"
      labels:
        - test
        - testing

    - title: "📋 Other Changes"
      labels:
        - "*"
