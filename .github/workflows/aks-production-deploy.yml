name: AKS Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: aks-production
  cancel-in-progress: false

env:
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
  AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'default' }}
  K8S_DEPLOYMENT: ${{ vars.K8S_DEPLOYMENT }}
  K8S_CONTAINER: ${{ vars.K8S_CONTAINER }}
  K8S_MANIFEST_PATH: ${{ vars.K8S_MANIFEST_PATH || 'k8s/production' }}

jobs:
  build-and-push:
    name: Build and Push Container
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image-meta.outputs.image_tag }}
      image_ref: ${{ steps.image-meta.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables
        shell: bash
        run: |
          set -euo pipefail
          required=(IMAGE_NAME ACR_LOGIN_SERVER AKS_RESOURCE_GROUP AKS_CLUSTER_NAME K8S_DEPLOYMENT K8S_CONTAINER)
          for v in "${required[@]}"; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required repository variable: $v" >&2
              exit 1
            fi
          done

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Compute image metadata
        id: image-meta
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_TAG="${GITHUB_SHA::12}"
          IMAGE_REF="${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        shell: bash
        run: |
          set -euo pipefail
          az acr login --name "${ACR_LOGIN_SERVER%%.*}"
          docker build -t "${{ steps.image-meta.outputs.image_ref }}" .
          docker push "${{ steps.image-meta.outputs.image_ref }}"

  deploy-production:
    name: Deploy to AKS Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure AKS context
        shell: bash
        run: |
          set -euo pipefail
          az aks get-credentials \
            --resource-group "${AKS_RESOURCE_GROUP}" \
            --name "${AKS_CLUSTER_NAME}" \
            --overwrite-existing

      - name: Apply Kubernetes manifests
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -n "${K8S_NAMESPACE}" -f "${K8S_MANIFEST_PATH}"

      - name: Update deployment image
        shell: bash
        run: |
          set -euo pipefail
          kubectl set image deployment/"${K8S_DEPLOYMENT}" \
            "${K8S_CONTAINER}=${{ needs.build-and-push.outputs.image_ref }}" \
            -n "${K8S_NAMESPACE}"
          kubectl rollout status deployment/"${K8S_DEPLOYMENT}" -n "${K8S_NAMESPACE}" --timeout=300s
