name: Java Release Pipeline

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  JAVA_VERSION: '17'
  DISTRIBUTION: 'temurin'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Generate changelog
        id: changelog
        run: |
          echo "changelog=Release ${VERSION}" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        java-version: [17, 21]
    outputs:
      artifact-path: ${{ steps.artifact.outputs.path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Java ${{ matrix.java-version }}
        uses: actions/setup-java@7a6d8a8234af8eb26422e18d6db37f93836dd4b6 # v4.6.0
        with:
          java-version: ${{ matrix.java-version }}
          distribution: ${{ env.DISTRIBUTION }}
          cache: maven

      - name: Build with Maven
        if: hashFiles('pom.xml') != ''
        run: mvn -B clean package -DskipTests

      - name: Build with Gradle
        if: hashFiles('build.gradle', 'build.gradle.kts') != ''
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      - name: Find artifact
        id: artifact
        run: |
          if [ -d "target" ]; then
            ARTIFACT_PATH="target/*.jar"
          elif [ -d "build/libs" ]; then
            ARTIFACT_PATH="build/libs/*.jar"
          fi
          echo "path=${ARTIFACT_PATH}" >> $GITHUB_OUTPUT

      - name: Generate checksum
        run: |
          if [ -d "target" ]; then
            cd target && sha256sum *.jar > checksums.txt
          elif [ -d "build/libs" ]; then
            cd build/libs && sha256sum *.jar > checksums.txt
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea04f3ef1b36843cd9da2b14c # v4.4.3
        with:
          name: java-artifacts-${{ matrix.java-version }}
          path: |
            target/*.jar
            build/libs/*.jar
            **/checksums.txt
          retention-days: 30

  publish:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: java-artifacts-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Release ${{ needs.prepare.outputs.version }}
          body: ${{ needs.prepare.outputs.changelog }}
          files: |
            **/*.jar
            **/checksums.txt
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: hashFiles('pom.xml') != ''
        run: mvn -B deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [prepare, publish]
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: java-artifacts-*
          merge-multiple: true

      - name: Deploy to staging
        id: deploy
        run: |
          echo "Deploying to staging environment..."
          echo "url=https://staging.example.com" >> $GITHUB_OUTPUT

  deploy-production:
    runs-on: ubuntu-latest
    needs: [prepare, publish, deploy-staging]
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: java-artifacts-*
          merge-multiple: true

      - name: Deploy to production
        id: deploy
        run: |
          echo "Deploying to production environment..."
          echo "url=https://production.example.com" >> $GITHUB_OUTPUT

      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: production" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ✅ Success" >> $GITHUB_STEP_SUMMARY
